<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ficha do Coelho</title>
  <link rel="stylesheet" href="/css/fichas_styles.css" />

  <script>
    function voltarficha() {
      if (confirm("Deseja cancelar? Alterações não salvas serão perdidas.")) {
        window.location.href = 'index.html';
      }
    }
  </script>
</head>
<body>
  <form id="formEditar" enctype="multipart/form-data">
    <div class="container">
      <div class="form-box">
        <div class="left">
          <!-- Foto -->
          <div class="foto-upload">
            <label for="foto_coelho" style="cursor: pointer;">
              <img id="previewFoto" 
                   class="foto-coelho" 
                   src="/img/coelho-default.png" 
                   alt="Foto do Coelho"
                   onclick="abrirFoto()">
              <p class="foto-texto">Clique na imagem para trocar a foto</p>
            </label>
            <input type="file" 
                   id="foto_coelho" 
                   name="foto_coelho" 
                   accept="image/*" 
                   style="display: none;"
                   onchange="previewFoto(event)">
          </div>

          <!-- Modal -->
          <div id="modalFoto" class="modal-foto" onclick="fecharFoto()">
            <img id="fotoGrande">
          </div>

          <label for="numero_coelho">Código
            <input type="text" id="numero_coelho" name="numero_coelho">
          </label>

          <!-- ... resto dos campos da esquerda ... -->
        </div>

        <div class="right">
          <!-- ... campos da direita permanecem iguais ... -->

          <div class="buttons">
            <button class="update" type="button" onclick="salvaralteracao()">Salvar Alterações</button>
            <button class="delete" type="button" onclick="deletarcoelho()">Deletar</button>
            <button class="back" type="button" onclick="voltarficha()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  </form>

  <script src="/js/editar.js"></script>

  <!-- Funções da Foto -->
  <script>
    function previewFoto(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('previewFoto').src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }

    function abrirFoto() {
      const modal = document.getElementById('modalFoto');
      const fotoGrande = document.getElementById('fotoGrande');
      const preview = document.getElementById('previewFoto');
      fotoGrande.src = preview.src;
      modal.style.display = "flex";
    }

    function fecharFoto() {
      document.getElementById('modalFoto').style.display = "none";
    }
  </script>
</body>
</html>
