<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adicionar Coelho</title>
  <link rel="stylesheet" href="/css/fichas_styles.css" />

  <script>
    function clicarbotao(){
      window.location.href='index.html';
    }
  </script>
</head>
<body>
  <form id="formCoelho" enctype="multipart/form-data">
    <div class="container">
      <div class="form-box">
        <div class="left">
    <div class="foto-upload">
  <label for="foto_coelho" style="cursor: pointer;">
    <img id="previewFoto" 
         class="foto-coelho" 
         src="/img/coelho-default.png" 
         alt="Foto do Coelho">
    <p class="foto-texto">   foto coelho</p>
  </label>
  <input type="file" id="foto_coelho" name="foto_coelho" accept="image/*" style="display: none;">
</div>
           

          <label for="numero_coelho">Código
            <input type="text" id="numero_coelho" name="numero_coelho" required>
          </label>

          <label for="raca_coelho">Raça
            <input type="text" id="raca_coelho" name="raca_coelho" maxlength="50" required>
          </label>

          <label for="data_nascimento_coelho">Data de Nascimento
            <input type="date" id="data_nascimento_coelho" name="data_nascimento_coelho" required>
          </label>

          <label for="peso_nascimento">Peso ao Nascer (kg)
            <input type="text" id="peso_nascimento" name="peso_nascimento" placeholder="Ex: 0.5">
          </label>

          <label for="peso_atual">Peso Atual (kg)
            <input type="text" id="peso_atual" name="peso_atual" placeholder="Ex: 2.3">
          </label>

          <label for="data_desmame">Data de Desmame
            <input type="date" id="data_desmame" name="data_desmame">
          </label>

          <label for="peso_desmame">Peso ao Desmame (kg)
            <input type="number" step="0.01" id="peso_desmame" name="peso_desmame" placeholder="Ex: 1.2">
          </label>
        </div>

        <div class="right">
          <label for="nome_coelho">Nome
            <input type="text" id="nome_coelho" name="nome_coelho" maxlength="50" required>
          </label>

          <label for="sexo_coelho">Sexo
            <select id="sexo_coelho" name="sexo_coelho" required>
              <option value="Macho">Macho</option>
              <option value="Fêmea">Fêmea</option>
            </select>
          </label>

          <label for="tipo_coelho">Tipo
            <select id="tipo_coelho" name="tipo_coelho" required>
              <option value="Matriz">Matriz</option>
              <option value="Reprodutor">Reprodutor</option>
              <option value="Láparo">Láparo</option>
              <option value="em crescimento">em crescimento</option>
            </select>
          </label>

          <label for="situacao_coelho">Situação
            <select id="situacao_coelho" name="situacao_coelho" required>
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
              <option value="transferido">Transferido</option>
            </select>
          </label>

          <label for="transferido_coelho">Transferido Para (ID)
            <input type="number" id="transferido_coelho" name="transferido_coelho">
          </label>

          <label for="matriz_coelho">Afiliação materna
            <input type="text" id="matriz_coelho" name="matriz_coelho" required>
          </label>

          <label for="reprodutor_coelho">Afiliação Paterna
            <input type="text" id="reprodutor_coelho" name="reprodutor_coelho" required>
          </label>

          <label for="observacoes_coelho">Observações
            <textarea id="observacoes_coelho" name="observacoes_coelho" rows="3"></textarea>
          </label>

          <input type="hidden" id="id_usuario" name="id_usuario">

          <div class="buttons">
            <button type="button" class="add" onclick="adicionarCoelho()">Adicionar</button>
            <button type="button" class="back" onclick="clicarbotao()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  </form>

  <script src="/js/Adicionar_coelho.js"></script>

  <!-- Preview da Foto -->
  <script>
    document.getElementById('foto_coelho').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          document.getElementById('previewFoto').src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
</body>
</html>
